<!DOCTYPE html>
<html lang="ru" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Расписание жены</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>👩</text></svg>">
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-container: #1e293b;
            --bg-header: #1e293b;
            --border-color: #334155;
            --text-main: #f8fafc;
            --text-muted: #64748b;
            --btn-secondary-bg: #334155;
            --btn-secondary-text: #cbd5e1;
            --btn-secondary-hover: #475569;
            --day-off-bg1: rgba(15, 23, 42, 0.6);
            --day-off-bg2: rgba(30, 41, 59, 0.6);

            --theme-green-bg: #14532d;
            --theme-green-text: #dcfce7;
            --theme-green-border: #22c55e;
            --theme-green-stroke: #16a34a;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .toolbar {
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .month-controls {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: auto;
        }

        .title-month {
            font-size: 1.15rem;
            font-weight: 800;
            white-space: nowrap;
        }

        button {
            cursor: pointer;
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 700;
            border-radius: 8px;
            border: none;
            padding: 9px 13px;
            transition: all 0.2s ease;
            background: var(--btn-secondary-bg);
            color: var(--btn-secondary-text);
        }

        button:hover {
            background: var(--btn-secondary-hover);
            transform: translateY(-1px);
        }

        button:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            transform: none;
        }

        .wife-summary {
            margin-bottom: 12px;
            padding: 10px 12px;
            border-radius: 10px;
            background: rgba(16, 185, 129, 0.08);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .calendar-wrapper {
            display: flex;
            flex-direction: column;
            flex: 1;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            background: var(--bg-container);
        }

        .week-header {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            background: var(--bg-header);
            border-bottom: 1px solid var(--border-color);
            text-align: center;
            font-weight: 800;
            font-size: 0.85rem;
            padding: 10px 0;
        }

        .week-day-name {
            color: var(--text-main);
        }

        .month-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            flex: 1;
            min-height: 0;
        }

        .day-cell {
            border-right: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
            padding: 7px;
            display: flex;
            flex-direction: column;
            position: relative;
            min-height: 86px;
        }

        .day-cell:nth-child(7n) {
            border-right: none;
        }

        .day-cell.empty {
            background: rgba(100, 116, 139, 0.08);
        }

        .day-cell.today-highlight {
            background-color: rgba(59, 130, 246, 0.12);
            border: 2px solid #3b82f6;
            z-index: 2;
        }

        .day-number {
            font-weight: 800;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 6px;
            display: inline-block;
            align-self: flex-start;
        }

        .today-highlight .day-number {
            color: #ffffff;
            background-color: #3b82f6;
            padding: 1px 7px;
            border-radius: 999px;
        }

        .shift-card {
            background: var(--theme-green-bg);
            color: var(--theme-green-text);
            border: 1px solid var(--theme-green-stroke);
            border-left: 4px solid var(--theme-green-border);
            border-radius: 7px;
            padding: 7px 8px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            gap: 4px;
        }

        .shift-role {
            font-size: 0.68rem;
            font-weight: 900;
            text-transform: uppercase;
            opacity: 0.75;
            letter-spacing: 0.05em;
        }

        .shift-time {
            font-size: 0.82rem;
            font-weight: 800;
        }

        .wife-day-off {
            background-image: repeating-linear-gradient(-45deg, var(--day-off-bg1), var(--day-off-bg1) 7px, var(--day-off-bg2) 7px, var(--day-off-bg2) 14px);
            justify-content: flex-start;
        }

        .day-off-label {
            font-size: 0.72rem;
            color: var(--text-muted);
            font-weight: 700;
            text-align: center;
            margin-top: auto;
            margin-bottom: auto;
            opacity: 0.55;
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .toolbar {
                align-items: stretch;
            }

            .title-month {
                width: 100%;
                text-align: center;
                order: -1;
            }

            .month-controls {
                width: 100%;
                margin-left: 0;
            }

            .month-controls button {
                flex: 1;
            }

            .week-header {
                font-size: 0.72rem;
                padding: 6px 0;
            }

            .day-cell {
                min-height: 62px;
                padding: 4px;
            }

            .day-cell.today-highlight {
                border-width: 1px;
            }

            .day-number {
                font-size: 0.7rem;
                margin-bottom: 3px;
            }

            .shift-role {
                font-size: 0.55rem;
            }

            .shift-time {
                font-size: 0.68rem;
            }

            .day-off-label {
                font-size: 0.55rem;
            }
        }
    </style>
</head>

<body>
    <div class="toolbar">
        <button id="btn-back-schedule" type="button">← Моё расписание</button>
        <div id="wife-month-title" class="title-month">👩 Расписание Кати</div>
        <div class="month-controls">
            <button id="btn-wife-prev-month" type="button">←</button>
            <button id="btn-wife-today" type="button">Сегодня</button>
            <button id="btn-wife-next-month" type="button">→</button>
        </div>
    </div>

    <div id="wife-summary" class="wife-summary">Загрузка расписания...</div>

    <div class="calendar-wrapper">
        <div class="week-header">
            <div class="week-day-name">Пн</div>
            <div class="week-day-name">Вт</div>
            <div class="week-day-name">Ср</div>
            <div class="week-day-name">Чт</div>
            <div class="week-day-name">Пт</div>
            <div class="week-day-name">Сб</div>
            <div class="week-day-name">Вс</div>
        </div>

        <div class="month-grid" id="month-grid-container"></div>
    </div>

    <script>
        const wifeSchedules = {
            "2026-06": {
                label: "Июнь 2026",
                shifts: {
                    "1": "выходной", "2": "выходной",
                    "3": { "start": "12:00", "end": "21:00" }, "4": { "start": "11:00", "end": "20:00" },
                    "5": { "start": "09:00", "end": "18:00" }, "6": { "start": "12:00", "end": "21:00" },
                    "7": { "start": "11:00", "end": "20:00" }, "8": "выходной", "9": "выходной",
                    "10": { "start": "09:00", "end": "18:00" }, "11": { "start": "11:00", "end": "21:00" },
                    "12": { "start": "10:00", "end": "20:00" }, "13": "выходной", "14": "выходной",
                    "15": { "start": "11:00", "end": "21:00" }, "16": { "start": "09:00", "end": "18:00" },
                    "17": { "start": "12:00", "end": "21:00" }, "18": { "start": "09:00", "end": "18:00" },
                    "19": { "start": "12:00", "end": "21:00" }, "20": { "start": "09:00", "end": "18:00" },
                    "21": "выходной", "22": { "start": "11:00", "end": "21:00" }, "23": { "start": "09:00", "end": "18:00" },
                    "24": { "start": "12:00", "end": "21:00" }, "25": { "start": "09:00", "end": "18:00" },
                    "26": { "start": "12:00", "end": "21:00" }, "27": { "start": "09:00", "end": "18:00" },
                    "28": "выходной", "29": { "start": "12:00", "end": "20:00" }, "30": { "start": "09:00", "end": "15:00" }
                }
            }
        };

        const container = document.getElementById('month-grid-container');
        const titleEl = document.getElementById('wife-month-title');
        const summaryEl = document.getElementById('wife-summary');
        const today = new Date();
        let selectedMonthKey = formatMonthKey(today);

        if (!wifeSchedules[selectedMonthKey]) {
            selectedMonthKey = Object.keys(wifeSchedules)[0] || selectedMonthKey;
        }

        document.getElementById('btn-back-schedule').addEventListener('click', () => {
            window.location.href = 'index.html';
        });

        document.getElementById('btn-wife-prev-month').addEventListener('click', () => {
            const [year, month] = selectedMonthKey.split('-').map(Number);
            selectedMonthKey = formatMonthKey(new Date(year, month - 2, 1));
            renderWifeCalendar();
        });

        document.getElementById('btn-wife-next-month').addEventListener('click', () => {
            const [year, month] = selectedMonthKey.split('-').map(Number);
            selectedMonthKey = formatMonthKey(new Date(year, month, 1));
            renderWifeCalendar();
        });

        document.getElementById('btn-wife-today').addEventListener('click', () => {
            selectedMonthKey = formatMonthKey(today);
            renderWifeCalendar();
        });

        function formatMonthKey(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            return `${year}-${month}`;
        }

        function monthLabelFromKey(monthKey) {
            const [year, month] = monthKey.split('-').map(Number);
            return new Intl.DateTimeFormat('ru-RU', { month: 'long', year: 'numeric' }).format(new Date(year, month - 1, 1));
        }

        function renderWifeCalendar() {
            const schedule = wifeSchedules[selectedMonthKey];
            const [year, month] = selectedMonthKey.split('-').map(Number);
            const firstDay = new Date(year, month - 1, 1);
            const daysInMonth = new Date(year, month, 0).getDate();
            const startOffset = (firstDay.getDay() + 6) % 7;
            const totalCells = Math.ceil((startOffset + daysInMonth) / 7) * 7;
            const weeksCount = totalCells / 7;
            const shifts = Object.values(schedule?.shifts || {}).filter(status => status && status.start);
            const daysOff = Object.values(schedule?.shifts || {}).filter(status => status === 'выходной').length;

            titleEl.textContent = `👩 Расписание Кати — ${schedule ? schedule.label : monthLabelFromKey(selectedMonthKey)}`;
            summaryEl.textContent = schedule
                ? `Смен: ${shifts.length} · Выходных: ${daysOff} · Дней без данных: ${Math.max(0, daysInMonth - shifts.length - daysOff)}`
                : `Расписание на ${monthLabelFromKey(selectedMonthKey)} пока не добавлено.`;

            container.style.gridTemplateRows = `repeat(${weeksCount}, minmax(70px, 1fr))`;
            container.innerHTML = '';

            for (let i = 0; i < totalCells; i++) {
                const dayCell = document.createElement('div');
                dayCell.className = 'day-cell';

                if (i < startOffset || i - startOffset + 1 > daysInMonth) {
                    dayCell.classList.add('empty');
                    container.appendChild(dayCell);
                    continue;
                }

                const day = i - startOffset + 1;
                const status = schedule?.shifts?.[String(day)];
                const isToday = day === today.getDate() && today.getMonth() + 1 === month && today.getFullYear() === year;

                if (isToday) dayCell.classList.add('today-highlight');

                const dayNumDiv = document.createElement('div');
                dayNumDiv.className = 'day-number';
                dayNumDiv.textContent = day;
                dayCell.appendChild(dayNumDiv);

                if (!schedule) {
                    const emptyLabel = document.createElement('div');
                    emptyLabel.className = 'day-off-label';
                    emptyLabel.textContent = 'нет данных';
                    dayCell.appendChild(emptyLabel);
                } else if (status === 'выходной') {
                    dayCell.classList.add('wife-day-off');
                    const offLabel = document.createElement('div');
                    offLabel.className = 'day-off-label';
                    offLabel.textContent = '☁️ ВЫХОДНОЙ';
                    dayCell.appendChild(offLabel);
                } else if (status && status.start) {
                    const shiftCard = document.createElement('div');
                    shiftCard.className = 'shift-card';
                    shiftCard.innerHTML = `
                        <div class="shift-role">Кассир</div>
                        <div class="shift-time">${status.start} - ${status.end}</div>
                    `;
                    dayCell.appendChild(shiftCard);
                } else {
                    const emptyLabel = document.createElement('div');
                    emptyLabel.className = 'day-off-label';
                    emptyLabel.textContent = 'нет данных';
                    dayCell.appendChild(emptyLabel);
                }

                container.appendChild(dayCell);
            }
        }

        renderWifeCalendar();
    </script>
</body>

</html>
