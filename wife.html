<!DOCTYPE html>
<html lang="ru" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Расписание жены — Июнь 2026</title>
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-container: #1e293b;
            --bg-header: #1e293b;
            --border-color: #334155;
            --text-main: #f8fafc;
            --text-muted: #64748b;
            --btn-secondary-bg: #334155;
            --btn-secondary-text: #cbd5e1;
            --btn-secondary-hover: #475569;
            --day-off-bg1: rgba(15, 23, 42, 0.6);
            --day-off-bg2: rgba(30, 41, 59, 0.6);

            --theme-green-bg: #14532d;
            --theme-green-text: #dcfce7;
            --theme-green-border: #22c55e;
            --theme-green-stroke: #16a34a;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .toolbar {
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .title-month {
            font-size: 1.2rem;
            font-weight: 700;
        }

        button {
            cursor: pointer;
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 600;
            border-radius: 6px;
            border: none;
            padding: 8px 16px;
            transition: all 0.2s ease;
            background: var(--btn-secondary-bg);
            color: var(--btn-secondary-text);
        }

        button:hover {
            background: var(--btn-secondary-hover);
        }

        .calendar-wrapper {
            display: flex;
            flex-direction: column;
            flex: 1;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            background: var(--bg-container);
        }

        .week-header {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            background: var(--bg-header);
            border-bottom: 1px solid var(--border-color);
            text-align: center;
            font-weight: 700;
            font-size: 0.85rem;
            padding: 10px 0;
        }

        .week-day-name {
            color: var(--text-main);
        }

        .month-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            grid-template-rows: repeat(5, 1fr);
            flex: 1;
        }

        .day-cell {
            border-right: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
            padding: 6px;
            display: flex;
            flex-direction: column;
            position: relative;
            min-height: 0;
        }

        .day-cell:nth-child(7n) {
            border-right: none;
        }

        .day-cell:nth-last-child(-n+7) {
            border-bottom: none;
        }

        .day-number {
            font-weight: 700;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        /* Карточка смены */
        .shift-card {
            background: var(--theme-green-bg);
            color: var(--theme-green-text);
            border: 1px solid var(--theme-green-stroke);
            border-left: 4px solid var(--theme-green-border);
            border-radius: 4px;
            padding: 4px 6px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            gap: 2px;
        }

        .shift-role {
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
            opacity: 0.7;
            letter-spacing: 0.05em;
        }

        .shift-time {
            font-size: 0.8rem;
            font-weight: 700;
        }

        /* Выходной */
        .wife-day-off {
            background-image: repeating-linear-gradient(-45deg, var(--day-off-bg1), var(--day-off-bg1) 7px, var(--day-off-bg2) 7px, var(--day-off-bg2) 14px);
            justify-content: flex-start;
        }

        .day-off-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            font-weight: 600;
            text-align: center;
            margin-top: auto;
            margin-bottom: auto;
            opacity: 0.5;
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .week-header {
                font-size: 0.75rem;
                padding: 6px 0;
            }

            .day-cell {
                padding: 3px;
            }

            .day-number {
                font-size: 0.7rem;
                margin-bottom: 2px;
            }

            .shift-role {
                font-size: 8px;
            }

            .shift-time {
                font-size: 0.65rem;
            }

            .day-off-label {
                font-size: 9px;
            }
        }
    </style>
</head>

<body>

    <div class="toolbar">
        <button onclick="window.location.href='index.html'">← Моё расписание</button>
        <div class="title-month">👩 Расписание Кати — Июнь 2026</div>
        <div style="width: 140px;"></div>
    </div>

    <div class="calendar-wrapper">
        <div class="week-header">
            <div class="week-day-name">Пн</div>
            <div class="week-day-name">Вт</div>
            <div class="week-day-name">Ср</div>
            <div class="week-day-name">Чт</div>
            <div class="week-day-name">Пт</div>
            <div class="week-day-name">Сб</div>
            <div class="week-day-name">Вс</div>
        </div>

        <div class="month-grid" id="month-grid-container">
        </div>
    </div>

    <script>
        const scheduleData = {
            "1": "выходной", "2": "выходной",
            "3": { "start": "12:00", "end": "21:00" }, "4": { "start": "11:00", "end": "20:00" },
            "5": { "start": "09:00", "end": "18:00" }, "6": { "start": "12:00", "end": "21:00" },
            "7": { "start": "11:00", "end": "20:00" }, "8": "выходной", "9": "выходной",
            "10": { "start": "09:00", "end": "18:00" }, "11": { "start": "11:00", "end": "21:00" },
            "12": { "start": "10:00", "end": "20:00" }, "13": "выходной", "14": "выходной",
            "15": { "start": "11:00", "end": "21:00" }, "16": { "start": "09:00", "end": "18:00" },
            "17": { "start": "12:00", "end": "21:00" }, "18": { "start": "09:00", "end": "18:00" },
            "19": { "start": "12:00", "end": "21:00" }, "20": { "start": "09:00", "end": "18:00" },
            "21": "выходной", "22": { "start": "11:00", "end": "21:00" }, "23": { "start": "09:00", "end": "18:00" },
            "24": { "start": "12:00", "end": "21:00" }, "25": { "start": "09:00", "end": "18:00" },
            "26": { "start": "12:00", "end": "21:00" }, "27": { "start": "09:00", "end": "18:00" },
            "28": "выходной", "29": { "start": "12:00", "end": "20:00" }, "30": { "start": "09:00", "end": "15:00" }
        };

        const container = document.getElementById('month-grid-container');

        // Отрисовываем 30 дней июня
        for (let day = 1; day <= 30; day++) {
            const dayCell = document.createElement('div');
            dayCell.className = 'day-cell';

            const dayNumDiv = document.createElement('div');
            dayNumDiv.className = 'day-number';
            dayNumDiv.textContent = day;
            dayCell.appendChild(dayNumDiv);

            const status = scheduleData[day];

            if (status === "выходной") {
                dayCell.classList.add('wife-day-off');
                dayCell.innerHTML += `<div class="day-off-label">☁️ ВЫХОДНОЙ</div>`;
            } else if (status && status.start) {
                dayCell.innerHTML += `
          <div class="shift-card">
            <div class="shift-role">Кассир</div>
            <div class="shift-time">${status.start} - ${status.end}</div>
          </div>
        `;
            }
            container.appendChild(dayCell);
        }

        // Добавляем 5 пустых ячеек в конце, чтобы забить сетку 5x7 до красивого ровного состояния
        for (let i = 0; i < 5; i++) {
            const emptyCell = document.createElement('div');
            emptyCell.className = 'day-cell';
            emptyCell.style.opacity = '0.2';
            container.appendChild(emptyCell);
        }
    </script>
</body>

</html>
