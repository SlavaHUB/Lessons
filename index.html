<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Интерактивное расписание</title>
  <link rel="stylesheet" href="style.css?v=1.6">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

  <div class="toolbar">
    <div class="nav-controls">
      <button id="btn-prev" class="btn-secondary">←</button>
      <button id="btn-today" class="btn-secondary">Сегодня</button>
      <button id="btn-next" class="btn-secondary">→</button>
      <span id="week-range-display" class="week-range">Загрузка...</span>
    </div>
    
    <button id="btn-burger" class="btn-secondary btn-burger">☰ Меню</button>
    
    <div class="action-controls" id="action-controls">
      <button id="btn-export" class="btn-secondary">📸 Скриншот</button>
      <button id="btn-find-slots" class="btn-secondary">🔍 Найти окошко</button>
      <button id="btn-copy-week" class="btn-secondary">📋 Скопировать прошлую неделю</button>
      <button id="btn-stats" class="btn-secondary">📊 Статистика</button>
      <button id="btn-add" class="btn-primary">+ Добавить урок</button>
    </div>
  </div>

  <div class="calendar-wrapper">
    <div class="calendar-header" id="calendar-header">
      <div class="time-header-cell"></div>
    </div>

    <div class="calendar-body">
      <div class="time-labels" id="time-labels"></div>
      <div class="days-grid" id="days-grid"></div>
    </div>
  </div>

  <div class="modal-overlay" id="modal">
    <div class="modal-content">
      <h3 id="modal-title">Новый урок</h3>
      
      <div class="form-row">
        <div class="form-group" style="flex: 1;">
          <label>Дата урока</label>
          <input type="date" id="input-date">
        </div>
        <div class="form-group" style="flex: 1;">
          <label>Школа</label>
          <select id="input-school">
            <option value="RTS">RTS</option>
            <option value="ITCompot">ITCompot</option>
            <option value="Zerocoder">Zerocoder</option>
            <option value="Matrius">Matrius</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>Урок / Задача</label>
        <input type="text" id="input-title" placeholder="Что за урок">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Начало</label>
          <input type="time" id="input-start" value="09:00">
        </div>
        <div class="form-group">
          <label>Конец</label>
          <input type="time" id="input-end" value="10:00">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group" style="flex: 1;">
          <label>Статус</label>
          <select id="input-status">
            <option value="Проведен">Проведен</option>
            <option value="Отменен">Отменен</option>
          </select>
        </div>
        <div class="form-group" style="flex: 1;">
          <label>Стоимость</label>
          <input type="number" id="input-price" placeholder="0" min="0">
        </div>
        <div class="form-group" style="flex: 1;">
          <label>Компенсация</label>
          <input type="number" id="input-comp" placeholder="0" min="0">
        </div>
      </div>

      <div class="form-row" id="repeat-block" style="background: #f8fafc; padding: 10px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #e2e8f0;">
        <div class="form-group" style="flex: 1; flex-direction: row; align-items: center; gap: 10px; margin-bottom: 0;">
          <input type="checkbox" id="input-repeat" style="width: auto; transform: scale(1.3); cursor: pointer;">
          <label style="margin: 0; cursor: pointer; color: #3b82f6;" for="input-repeat">Повторять каждую неделю</label>
        </div>
        <div class="form-group" style="flex: 1; margin-bottom: 0; display: none;" id="repeat-count-group">
          <label>Сколько недель (включая эту)?</label>
          <input type="number" id="input-repeat-count" value="4" min="2" max="12" style="padding: 4px 8px;">
        </div>
      </div>

      <div class="form-group">
        <label>Описание (необязательно)</label>
        <input type="text" id="input-desc" placeholder="Например: Токаренко М. Е.">
      </div>

      <div class="modal-actions">
        <button id="btn-cancel" class="btn-secondary">Отмена</button>
        <button id="btn-save" class="btn-primary">Сохранить</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="password-modal">
    <div class="modal-content" style="max-width: 320px;">
      <h3 id="password-title">Требуется доступ</h3>
      <div class="form-group">
        <label>Пароль администратора</label>
        <input type="password" id="input-password" placeholder="Введите пароль...">
      </div>
      <div id="password-error" style="color: #ef4444; font-size: 0.8rem; font-weight: 600; margin-bottom: 15px; display: none;">
        Неверный пароль!
      </div>
      <div class="modal-actions">
        <button id="btn-pass-cancel" class="btn-secondary">Отмена</button>
        <button id="btn-pass-submit" class="btn-primary">Войти</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="stats-modal">
    <div class="modal-content" style="max-width: 350px;">
      <h3 id="stats-header-title">📊 Финансы</h3>
      <div id="stats-container" class="stats-list"></div>
      <div class="modal-actions">
        <button id="btn-stats-close" class="btn-primary">Закрыть</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="slots-modal">
    <div class="modal-content" style="max-width: 400px;">
      <h3>🔍 Поиск свободных окошек</h3>
      
      <div class="form-group">
        <label>Длительность урока (в минутах)</label>
        <input type="number" id="input-slot-duration" value="45" min="15" step="5">
      </div>
      
      <div class="form-group">
        <label>Дни недели (текущая неделя)</label>
        <div style="display: flex; gap: 12px; flex-wrap: wrap; margin-top: 5px;" id="slot-days-container">
          <label><input type="checkbox" value="0"> Пн</label>
          <label><input type="checkbox" value="1"> Вт</label>
          <label><input type="checkbox" value="2"> Ср</label>
          <label><input type="checkbox" value="3"> Чт</label>
          <label><input type="checkbox" value="4"> Пт</label>
          <label><input type="checkbox" value="5"> Сб</label>
          <label><input type="checkbox" value="6"> Вс</label>
        </div>
      </div>

      <div class="modal-actions">
        <button id="btn-slots-cancel" class="btn-secondary">Закрыть</button>
        <button id="btn-slots-search" class="btn-primary">Искать</button>
      </div>

      <div id="slots-results" style="margin-top: 20px; max-height: 250px; overflow-y: auto; font-size: 0.9rem; line-height: 1.4;">
        </div>
    </div>
  </div>

  <script src="script.js?v=1.2"></script>
</body>
</html>
