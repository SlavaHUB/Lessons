<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Интерактивное расписание</title>
  <link rel="stylesheet" href="style.css?v=2.4">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>

<body>

  <div class="toolbar">
    <div class="nav-controls">
      <button id="btn-prev" class="btn-secondary">←</button>
      <button id="btn-today" class="btn-secondary">Сегодня</button>
      <button id="btn-next" class="btn-secondary">→</button>
      <button id="btn-theme" class="btn-secondary">🌙 Тема</button>
      <span id="week-range-display" class="week-range">Загрузка...</span>
    </div>

    <button id="btn-burger" class="btn-secondary btn-burger">☰ Меню</button>

    <div class="action-controls" id="action-controls">
      <button id="btn-export" class="btn-secondary">📸 Скриншот</button>
      <button id="btn-find-slots" class="btn-secondary">🔍 Подобрать урок</button>
    </div>
  </div>

  <div id="cookie-alert" class="cookie-alert">
    🚨 <strong>Внимание!</strong> Слетели куки для: <span id="expired-schools"></span>. Обновите их в .env на Render!
  </div>

  <div class="calendar-wrapper">
    <div class="calendar-header" id="calendar-header">
      <div class="time-header-cell"></div>
    </div>

    <div class="calendar-body">
      <div class="time-labels" id="time-labels"></div>
      <div class="days-grid" id="days-grid"></div>
    </div>
  </div>

  <div class="modal-overlay" id="slots-modal">
    <div class="modal-content" style="max-width: 400px;">
      <h3>🔍 Поиск свободных окошек</h3>

      <div class="form-group">
        <label>Длительность урока (в минутах)</label>
        <input type="number" id="input-slot-duration" value="45" min="15" step="5">
      </div>

      <div class="form-group">
        <label>Дни недели (текущая неделя)</label>
        <div style="display: flex; gap: 12px; flex-wrap: wrap; margin-top: 5px;" id="slot-days-container">
          <label><input type="checkbox" value="0"> Пн</label>
          <label><input type="checkbox" value="1"> Вт</label>
          <label><input type="checkbox" value="2"> Ср</label>
          <label><input type="checkbox" value="3"> Чт</label>
          <label><input type="checkbox" value="4"> Пт</label>
          <label><input type="checkbox" value="5"> Сб</label>
          <label><input type="checkbox" value="6"> Вс</label>
        </div>
      </div>

      <div class="modal-actions">
        <button id="btn-slots-cancel" class="btn-secondary">Закрыть</button>
        <button id="btn-slots-search" class="btn-primary">Искать</button>
      </div>

      <div id="slots-results"
        style="margin-top: 20px; max-height: 250px; overflow-y: auto; font-size: 0.9rem; line-height: 1.4;">
      </div>
    </div>
  </div>

  <script src="script.js?v=2.4"></script>
</body>

</html>
